<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đặt hàng | Nova Laptop Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <nav class="navbar container" aria-label="Điều hướng chính">
      <a class="logo" href="index.html"><span class="logo-mark">N</span><span>Nova</span></a>
      <button class="menu-toggle" type="button" aria-label="Mở menu" aria-expanded="false">☰</button>
      <div class="nav-panel">
        <ul class="nav-links">
          <li><a href="index.html">Trang chủ</a></li>
          <li><a href="products.html">Sản phẩm</a></li>
          <li><a href="news.html">Tin tức</a></li>
          <li><a href="cart.html">Giỏ hàng</a></li>
        </ul>
      </div>
      <a class="cart-link" href="cart.html"><span class="cart-icon">▣</span><span class="cart-count">0</span></a>
    </nav>
  </header>

  <main>
    <section class="page-hero compact">
      <div class="container">
        <span class="eyebrow">Checkout</span>
        <h1>Thông tin đặt hàng</h1>
      </div>
    </section>
    <section class="section container checkout-layout">
      <form class="checkout-form" novalidate>
        <div class="form-field">
          <label for="fullname">Họ tên</label>
          <input id="fullname" name="fullname" type="text" placeholder="Nguyễn Văn A">
          <small></small>
        </div>
        <div class="form-field">
          <label for="phone">Số điện thoại</label>
          <input id="phone" name="phone" type="tel" placeholder="0901234567">
          <small></small>
        </div>
        <div class="form-field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com">
          <small></small>
        </div>
        <div class="form-field">
          <label for="address">Địa chỉ</label>
          <input id="address" name="address" type="text" placeholder="Số nhà, phường/xã, quận/huyện">
          <small></small>
        </div>
        <div class="form-field">
          <label for="note">Ghi chú</label>
          <textarea id="note" name="note" rows="5" placeholder="Thời gian giao hàng mong muốn"></textarea>
          <small></small>
        </div>
        <button class="btn btn-primary" type="submit">Đặt hàng</button>
      </form>
      <aside class="checkout-note">
        <h2>Cam kết Nova</h2>
        <p>Giao nhanh trong 2 giờ tại nội thành, đổi mới 15 ngày và hỗ trợ cài đặt miễn phí cho mọi đơn hàng laptop.</p>
      </aside>
    </section>
  </main>

  <footer class="site-footer compact-footer">
    <p class="copyright">© 2026 Nova Laptop Store.</p>
  </footer>
  <div class="toast" role="status" aria-live="polite"></div>
  <script src="script.js"></script>
</body>
</html>
